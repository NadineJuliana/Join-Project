<section
  class="landing-page"
  [class.landing-page--no-intro]="showSignupForm || skipIntro"
>
  <div class="landing-intro-bg" aria-hidden="true"></div>

  @if (!showSignupForm) {
    <div class="landing-cta" aria-label="Sign up call to action">
      <span>Not a Join user?</span>
      <button type="button" class="btn btn--primary" (click)="openSignupForm()">
        Sign up
      </button>
    </div>
  }

  <div class="landing-login-form">
    @if (showSignupForm) {
      <app-signup-form></app-signup-form>
    } @else {
      <app-login-form></app-login-form>
    }
  </div>

  <img
    class="landing-logo landing-logo--white"
    src="Join Logo white.svg"
    alt=""
    aria-hidden="true"
  />
  <img
    class="landing-logo landing-logo--default"
    src="Join Logo.svg"
    alt="Join Logo"
  />

  <div class="legal">
    <a routerLink="/privacy-policy" data-text="Privacy policy"
      >Privacy policy</a
    >
    <a routerLink="/legal-notice" data-text="Legal notice">Legal notice</a>
  </div>
</section>

<div class="task-form-category">
  <button
    id="task-category"
    type="button"
    class="task-form-category__trigger"
    [class.task-form-category__trigger--invalid]="invalid()"
    [attr.aria-expanded]="isDropdownOpen()"
    aria-haspopup="listbox"
    (click)="toggleDropdown()"
  >
    <span
      class="task-form-category__label"
      [class.task-form-category__label--placeholder]="!value()"
    >
      {{ getCategoryDisplayLabel() }}
    </span>
    <span
      class="task-form-category__arrow"
      [class.task-form-category__arrow--open]="isDropdownOpen()"
      aria-hidden="true"
    ></span>
  </button>

  @if (isDropdownOpen()) {
    <div class="task-form-category__dropdown" role="listbox">
      @for (option of options(); track option.value) {
        <button
          type="button"
          class="task-form-category__item"
          [class.task-form-category__item--active]="
            isCategorySelected(option.value)
          "
          [attr.aria-selected]="isCategorySelected(option.value)"
          (click)="selectCategory(option.value)"
        >
          <h5>{{ option.label }}</h5>
        </button>
      }
    </div>
  }
</div>

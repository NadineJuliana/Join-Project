<div class="card-detail" (click)="onClose()">
    <div [style.backgroundColor]="task().categoryColor" class="card-detail__category"
        (click)="$event.stopPropagation()">
        <p>{{ task().category | capitalize }}</p> <!--das Signal wird aufgerufen um die Werkte zu bekommen-->
    </div>
    <h1>{{ task().title }}</h1>
    <button (click)="onClose()">X</button>

</div>
